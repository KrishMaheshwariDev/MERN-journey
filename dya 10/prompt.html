<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gemini Prompt Tester</title>

<style>
body{
    font-family: Arial;
    max-width: 700px;
    margin: 40px auto;
}

textarea{
    width:100%;
    height:120px;
}

button{
    margin-top:10px;
    padding:10px 16px;
}

#result{
    margin-top:20px;
    padding:15px;
    border:1px solid #ddd;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Gemini Prompt</h2>

<textarea id="prompt" placeholder="Enter your prompt here"></textarea>

<br>
<button onclick="sendPrompt()">Send to Gemini</button>

<div id="result"></div>

<script>

const API_KEY = "AIzaSyBfj7aXkF0QZ0SCXmF2EuvbwoGOHBanhTY";

async function sendPrompt(){

    const prompt = document.getElementById("prompt").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerText = "Thinking...";

    const url =
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

    try{

        const response = await fetch(url,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                contents:[
                    {
                        parts:[
                            { text: "hello, its been a while" }
                        ]
                    }
                ]
            })
        });

        const data = await response.json();
        console.log(data);

        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

        resultDiv.innerText = text || "Model returned no text";

    }
    catch(err){
        resultDiv.innerText = "Request failed: " + err;
    }
}

</script>

</body>
</html>
